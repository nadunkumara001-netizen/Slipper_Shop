<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | WALKA Standard Slippers</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            padding: 4rem 5%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 3rem;
            align-items: flex-start;
        }
        .checkout-form-container {
            flex: 2;
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .checkout-summary {
            flex: 1;
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: background-color 0.4s ease, color 0.4s ease;
            position: sticky;
            top: 100px;
        }
        .checkout-summary h3 {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--secondary-color);
            padding-bottom: 1rem;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--secondary-color);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .checkout-container {
                flex-direction: column;
                padding: 2rem 5%;
                gap: 1.5rem;
            }
            .checkout-form-container {
                padding: 1.5rem;
            }
            .checkout-summary {
                width: 100%;
                position: static;
                padding: 1.5rem;
            }
        }

        /* Success Modal */
        .success-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center; justify-content: center;
            z-index: 2000;
        }
        .success-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: background-color 0.4s ease, color 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .success-box h2 {
            color: #52c41a;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html"><h1>WALKA</h1></a>
        </div>
        <div class="right-controls">
            <div id="slTimeDisplay" style="font-size: 0.85rem; font-weight: 600; color: var(--text-light); margin-right: 1.5rem; display: none;"></div>
            <a href="index.html" class="theme-toggle" style="font-size: 1rem; font-weight: 600;">Back to Store</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">🌙</button>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-form-container contact-form">
            <h2 style="margin-bottom: 2rem;">Shipping Details</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="custEmail" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="custPhone" placeholder="+94 77 123 4567" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="custAddress" rows="3" placeholder="123 Comfort Ave, Colombo" required></textarea>
                </div>
                <div id="formError" style="color: #ff4d4f; margin-bottom: 1rem; font-weight: 600; display: none;"></div>
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1.2rem;">Place Order</button>
            </form>
        </div>

        <div class="checkout-summary">
            <h3>Order Summary</h3>
            <div id="summaryItems">
                <!-- Javascript populated -->
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="summaryTotalText">LKR 0</span>
            </div>
        </div>
    </main>

    <div class="success-modal" id="successModal">
        <div class="success-box">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
            <h2>Order Placed!</h2>
            <p>Your order has been placed successfully.</p>
            <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-light);">Redirecting to store...</p>
        </div>
    </div>

    <script src="checkout.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const themeToggleBtn = document.getElementById('themeToggle');
            const rootEl = document.documentElement;
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                rootEl.setAttribute('data-theme', 'dark');
                if (themeToggleBtn) themeToggleBtn.innerText = '☀️';
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const currentTheme = rootEl.getAttribute('data-theme');
                    if (currentTheme === 'dark') {
                        rootEl.setAttribute('data-theme', 'light');
                        themeToggleBtn.innerText = '🌙';
                        localStorage.setItem('theme', 'light');
                    } else {
                        rootEl.setAttribute('data-theme', 'dark');
                        themeToggleBtn.innerText = '☀️';
                        localStorage.setItem('theme', 'dark');
                    }
                });
            }
        });
    </script>
</body>
</html>
